name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  prepare:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          # The Windows MSI (WiX) bundler only accepts MAJOR.MINOR.PATCH with an
          # optional NUMERIC pre-release identifier <= 65535. Reject anything else
          # here so a bad input fails before pushing a tag or starting any build.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Use MAJOR.MINOR.PATCH, optionally with a numeric pre-release <= 65535 (e.g. 1.1.2 or 1.1.2-1). Non-numeric identifiers like '-pre1' or '-rc1' break the Windows MSI build."
            exit 1
          fi

      - name: Bump version and tag
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');
            "
            node -e "
              const fs = require('fs');
              let s = fs.readFileSync('src-tauri/Cargo.toml', 'utf8');
              s = s.replace(/^version = \".*\"$/m, 'version = \"${{ inputs.version }}\"');
              fs.writeFileSync('src-tauri/Cargo.toml', s);
            "
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json src-tauri/Cargo.toml
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin HEAD
          else
            echo "Version already ${{ inputs.version }}, skipping bump commit"
          fi
          git tag "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists locally"
          git push origin "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists on remote"

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: ./.github/actions/setup-build-env

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          updaterJsonPath: latest.json
          updaterJsonPreferNsis: true
          tagName: v${{ inputs.version }}
          releaseName: FH6 Telemetry v${{ inputs.version }}
          releaseBody: |
            ## Install

            **Windows** — download the `.exe` installer (NSIS) or `.msi`.
            **macOS** — download the `.dmg` (universal, Intel + Apple Silicon). The build is
            unsigned, so on first launch right-click the app → **Open**, or run
            `xattr -dr com.apple.quarantine "/Applications/FH6 Telemetry.app"`.
            **Linux** — download the `.AppImage` (portable), or the `.deb` / `.rpm`.
            **Headless server** — download `fh6-tel-serve-*` to run the dashboard as a service; see `packaging/`.

            Configure Forza Horizon 6 to send UDP telemetry to your PC's IP on port **20440**
            (*Settings → HUD and gameplay → Data out → Format: Car Dash*).
          releaseDraft: true
          prerelease: false

      - name: Build server binary (non-macOS)
        if: runner.os != 'macOS'
        shell: bash
        working-directory: src-tauri
        run: cargo build --release --no-default-features --features server --bin fh6-tel-serve

      - name: Build server binary (macOS universal)
        if: runner.os == 'macOS'
        shell: bash
        working-directory: src-tauri
        run: |
          cargo build --release --no-default-features --features server --bin fh6-tel-serve --target aarch64-apple-darwin
          cargo build --release --no-default-features --features server --bin fh6-tel-serve --target x86_64-apple-darwin
          lipo -create \
            target/aarch64-apple-darwin/release/fh6-tel-serve \
            target/x86_64-apple-darwin/release/fh6-tel-serve \
            -output target/release/fh6-tel-serve

      - name: Stage and upload server binary
        shell: bash
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="v${{ inputs.version }}"
          case "${{ runner.os }}" in
            Windows) SRC="src-tauri/target/release/fh6-tel-serve.exe"; OUT="fh6-tel-serve-windows-x86_64.exe" ;;
            Linux)   SRC="src-tauri/target/release/fh6-tel-serve";     OUT="fh6-tel-serve-linux-x86_64" ;;
            macOS)   SRC="src-tauri/target/release/fh6-tel-serve";     OUT="fh6-tel-serve-macos-universal" ;;
          esac
          cp "$SRC" "$OUT"
          gh release upload "$TAG" "$OUT" --clobber --repo "$GITHUB_REPOSITORY"

  docker:
    needs: prepare
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          # metadata-action lowercases the image name, so a mixed-case owner is fine.
          images: ghcr.io/${{ github.repository_owner }}/fh6-tel-serve
          tags: |
            type=raw,value=${{ inputs.version }}
            type=raw,value=latest,enable=${{ !contains(inputs.version, '-') }}

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
