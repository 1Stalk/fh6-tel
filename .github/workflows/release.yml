name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: FH6 Telemetry ${{ github.ref_name }}
          releaseBody: |
            ## Install

            Download the `.exe` installer (NSIS) or `.msi` below.

            Configure Forza Horizon 6 to send UDP telemetry to your PC's IP on port **20440**
            (*Settings → HUD and gameplay → Data out → Format: Car Dash*).
          releaseDraft: true
          prerelease: false
