name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  prepare:
    permissions:
      contents: write
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Validate version
        shell: bash
        run: |
          VERSION="${{ inputs.version }}"
          # The Windows MSI (WiX) bundler only accepts MAJOR.MINOR.PATCH with an
          # optional NUMERIC pre-release identifier <= 65535. Reject anything else
          # here so a bad input fails before pushing a tag or starting any build.
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+(-[0-9]+)?$ ]]; then
            echo "::error::Invalid version '$VERSION'. Use MAJOR.MINOR.PATCH, optionally with a numeric pre-release <= 65535 (e.g. 1.1.2 or 1.1.2-1). Non-numeric identifiers like '-pre1' or '-rc1' break the Windows MSI build."
            exit 1
          fi

      - name: Bump version and tag
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');
            "
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin HEAD
          else
            echo "Version already ${{ inputs.version }}, skipping bump commit"
          fi
          git tag "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists locally"
          git push origin "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists on remote"

  build:
    needs: prepare
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-latest
            args: '--target universal-apple-darwin'
          - platform: ubuntu-22.04
            args: ''
          - platform: windows-latest
            args: ''
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: v${{ inputs.version }}

      - uses: ./.github/actions/setup-build-env

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          args: ${{ matrix.args }}
          updaterJsonPath: latest.json
          updaterJsonPreferNsis: true
          tagName: v${{ inputs.version }}
          releaseName: FH6 Telemetry v${{ inputs.version }}
          releaseBody: |
            ## Install

            **Windows** — download the `.exe` installer (NSIS) or `.msi`.
            **macOS** — download the `.dmg` (universal, Intel + Apple Silicon). The build is
            unsigned, so on first launch right-click the app → **Open**, or run
            `xattr -dr com.apple.quarantine "/Applications/FH6 Telemetry.app"`.
            **Linux** — download the `.AppImage` (portable), or the `.deb` / `.rpm`.

            Configure Forza Horizon 6 to send UDP telemetry to your PC's IP on port **20440**
            (*Settings → HUD and gameplay → Data out → Format: Car Dash*).
          releaseDraft: true
          prerelease: false
