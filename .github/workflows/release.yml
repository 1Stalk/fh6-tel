name: Release

on:
  workflow_dispatch:
    inputs:
      version:
        description: 'Version to release (e.g. 1.0.0)'
        required: true

jobs:
  release:
    permissions:
      contents: write
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Bump version and tag
        shell: bash
        run: |
          CURRENT=$(node -p "require('./package.json').version")
          if [ "$CURRENT" != "${{ inputs.version }}" ]; then
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('package.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('package.json', JSON.stringify(p, null, 2) + '\n');
            "
            node -e "
              const fs = require('fs');
              const p = JSON.parse(fs.readFileSync('src-tauri/tauri.conf.json', 'utf8'));
              p.version = '${{ inputs.version }}';
              fs.writeFileSync('src-tauri/tauri.conf.json', JSON.stringify(p, null, 2) + '\n');
            "
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add package.json src-tauri/tauri.conf.json
            git commit -m "chore: release v${{ inputs.version }}"
            git push origin HEAD
          else
            echo "Version already ${{ inputs.version }}, skipping bump commit"
          fi
          git tag "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists locally"
          git push origin "v${{ inputs.version }}" 2>/dev/null || echo "Tag already exists on remote"

      - name: Add MSVC linker to PATH
        shell: pwsh
        run: |
          $vswhere = "C:\Program Files (x86)\Microsoft Visual Studio\Installer\vswhere.exe"
          $vsPath = & $vswhere -latest -requires Microsoft.VisualStudio.Component.VC.Tools.x86.x64 -property installationPath
          $version = (Get-Content "$vsPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
          $linkerDir = "$vsPath\VC\Tools\MSVC\$version\bin\Hostx64\x64"
          Write-Host "MSVC linker dir: $linkerDir"
          Add-Content $env:GITHUB_PATH $linkerDir

      - name: Install frontend dependencies
        run: npm ci

      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          updaterJsonPath: latest.json
          updaterJsonPreferNsis: true
          tagName: v${{ inputs.version }}
          releaseName: FH6 Telemetry v${{ inputs.version }}
          releaseBody: |
            ## Install

            Download the `.exe` installer (NSIS) or `.msi` below.

            Configure Forza Horizon 6 to send UDP telemetry to your PC's IP on port **20440**
            (*Settings → HUD and gameplay → Data out → Format: Car Dash*).
          releaseDraft: true
          prerelease: false
