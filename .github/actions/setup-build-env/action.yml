name: 'Set up build environment'
description: 'Node + Rust toolchains, build caches, per-OS native deps, and frontend dependencies'

runs:
  using: composite
  steps:
    - name: Set up Node.js
      uses: actions/setup-node@v4
      with:
        node-version: lts/*
        cache: npm

    - name: Set up Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        # Both arches so macOS can produce a universal (Intel + Apple Silicon) binary.
        targets: ${{ runner.os == 'macOS' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

    - name: Cache Rust build artifacts
      uses: Swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Install Linux system dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          libwebkit2gtk-4.1-dev \
          libgtk-3-dev \
          libayatana-appindicator3-dev \
          librsvg2-dev \
          libxdo-dev \
          libssl-dev \
          patchelf \
          file \
          squashfs-tools \
          libfuse2

    - name: Configure MSVC linker
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $vsPath = "C:\Program Files\Microsoft Visual Studio\2022\Enterprise"
        $ver = (Get-Content "$vsPath\VC\Auxiliary\Build\Microsoft.VCToolsVersion.default.txt").Trim()
        $link = "$vsPath\VC\Tools\MSVC\$ver\bin\Hostx64\x64\link.exe"
        Write-Host "Linker: $link (exists=$(Test-Path $link))"
        $escaped = $link.Replace('\', '/')
        New-Item -Force -ItemType Directory src-tauri\.cargo | Out-Null
        "[target.x86_64-pc-windows-msvc]`nlinker = `"$escaped`"" | Set-Content src-tauri\.cargo\config.toml
        Get-Content src-tauri\.cargo\config.toml

    - name: Install frontend dependencies
      shell: bash
      run: npm ci
